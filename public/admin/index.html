<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - CloudBlog</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #3b82f6; --bg: #f8fafc; --surface: #fff; --text: #0f172a; --text-sec: #64748b; --border: #e2e8f0; --danger: #ef4444; --success: #10b981; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    a { color: var(--primary); text-decoration: none; }

    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-left h1 { font-size: 16px; font-weight: 700; }
    .header-left a { font-size: 14px; color: var(--text-sec); }
    .header-left a:hover { color: var(--primary); }
    .logout-btn { padding: 7px 16px; background: #f1f5f9; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; }

    main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .stat-card .label { font-size: 13px; color: var(--text-sec); margin-bottom: 6px; }
    .stat-card .value { font-size: 28px; font-weight: 700; }

    .section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 24px; }
    .section-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .section-header h2 { font-size: 15px; font-weight: 600; }
    .tab-bar { display: flex; gap: 4px; padding: 0 20px; border-bottom: 1px solid var(--border); }
    .tab { padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--text-sec); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .comment-item { display: flex; gap: 16px; padding: 16px 20px; border-bottom: 1px solid var(--border); align-items: flex-start; }
    .comment-item:last-child { border-bottom: none; }
    .comment-avatar { width: 36px; height: 36px; border-radius: 50%; background: #f1f5f9; flex-shrink: 0; }
    .comment-body { flex: 1; min-width: 0; }
    .comment-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
    .comment-author { font-weight: 600; font-size: 13px; }
    .comment-time { font-size: 12px; color: var(--text-sec); }
    .comment-post { font-size: 12px; color: var(--primary); background: #eff6ff; padding: 2px 8px; border-radius: 10px; }
    .comment-content { font-size: 13px; color: var(--text); line-height: 1.5; margin-bottom: 8px; word-break: break-word; }
    .comment-actions { display: flex; gap: 6px; }
    .action-btn { padding: 4px 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; }
    .approve-btn { background: #dcfce7; color: #166534; }
    .spam-btn { background: #fef3c7; color: #92400e; }
    .delete-btn { background: #fee2e2; color: #991b1b; }
    .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-approved { background: #dcfce7; color: #166534; }
    .status-spam { background: #fee2e2; color: #991b1b; }

    .empty-state { text-align: center; padding: 40px; color: var(--text-sec); font-size: 14px; }
    .loading { text-align: center; padding: 40px; color: var(--text-sec); font-size: 14px; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 10px 24px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; white-space: nowrap; }
    .toast.show { opacity: 1; }

    .post-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--border); }
    .post-item:last-child { border-bottom: none; }
    .post-info .post-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .post-info .post-meta { font-size: 12px; color: var(--text-sec); }
    .post-actions { display: flex; gap: 6px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <h1>📝 CloudBlog 管理后台</h1>
    <a href="/">← 返回博客</a>
  </div>
  <button class="logout-btn" onclick="logout()">退出登录</button>
</header>

<main>
  <h2 class="page-title">概览</h2>
  <div class="stats">
    <div class="stat-card">
      <div class="label">文章总数</div>
      <div class="value" id="statPosts">-</div>
    </div>
    <div class="stat-card">
      <div class="label">待审评论</div>
      <div class="value" id="statPending">-</div>
    </div>
    <div class="stat-card">
      <div class="label">已发布</div>
      <div class="value" id="statApproved">-</div>
    </div>
    <div class="stat-card">
      <div class="label">垃圾评论</div>
      <div class="value" id="statSpam">-</div>
    </div>
  </div>

  <div class="section">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('comments', this)">💬 评论管理</div>
      <div class="tab" onclick="switchTab('posts', this)">📝 文章管理</div>
    </div>

    <div id="tab-comments" class="tab-content active">
      <div id="commentsLoading" class="loading">加载中...</div>
      <div id="commentsList"></div>
    </div>

    <div id="tab-posts" class="tab-content">
      <div id="postsLoading" class="loading">加载中...</div>
      <div id="postsList"></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  function getToken() {
    return localStorage.getItem('cloudblog_token') || '';
  }

  function requireAuth() {
    if (!getToken()) {
      window.location.href = '/admin/login.html';
      return false;
    }
    return true;
  }

  function logout() {
    localStorage.removeItem('cloudblog_token');
    window.location.href = '/admin/login.html';
  }

  async function apiFetch(url, options = {}) {
    const token = getToken();
    const headers = {
      'Content-Type': 'application/json',
      ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
      ...options.headers,
    };
    const res = await fetch(url, { ...options, headers });
    if (res.status === 401) {
      logout();
      throw new Error('Unauthorized');
    }
    return res;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function switchTab(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  // ── Stats ──
  async function loadStats() {
    try {
      const [postsRes, commentsRes] = await Promise.all([
        fetch('/api/posts'),
        apiFetch('/api/admin/comments')
      ]);
      const postsData = postsRes.ok ? await postsRes.json() : { posts: [] };
      const commentsData = commentsRes.ok ? await commentsRes.json() : { comments: [] };
      const comments = commentsData.comments || [];

      document.getElementById('statPosts').textContent = (postsData.posts || []).length;
      document.getElementById('statPending').textContent = comments.filter(c => c.status === 'pending').length;
      document.getElementById('statApproved').textContent = comments.filter(c => c.status === 'approved').length;
      document.getElementById('statSpam').textContent = comments.filter(c => c.status === 'spam').length;
    } catch (e) {
      // silently fail
    }
  }

  // ── Comments ──
  async function loadComments() {
    const container = document.getElementById('commentsList');
    const loading = document.getElementById('commentsLoading');
    loading.style.display = 'block';
    container.innerHTML = '';

    try {
      const res = await apiFetch('/api/admin/comments');
      const data = await res.json();
      const comments = data.comments || [];
      loading.style.display = 'none';

      if (comments.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无评论</div>';
        return;
      }

      container.innerHTML = comments.map(c => `
        <div class="comment-item" id="comment-${c.id}">
          <div class="comment-avatar"></div>
          <div class="comment-body">
            <div class="comment-meta">
              <span class="comment-author">${escapeHtml(c.author)}</span>
              <span class="comment-time">${formatTime(c.createdAt)}</span>
              <span class="comment-post">${escapeHtml(c.postSlug)}</span>
              <span class="status-badge status-${c.status}">${c.status === 'pending' ? '待审' : c.status === 'approved' ? '已发布' : '垃圾'}</span>
            </div>
            <div class="comment-content">${escapeHtml(c.content)}</div>
            <div class="comment-actions">
              ${c.status !== 'approved' ? `<button class="action-btn approve-btn" onclick="moderateComment('${c.id}', 'approved')">✅ 通过</button>` : ''}
              ${c.status !== 'spam' ? `<button class="action-btn spam-btn" onclick="moderateComment('${c.id}', 'spam')">🚫 Spam</button>` : ''}
              <button class="action-btn delete-btn" onclick="deleteComment('${c.id}')">🗑️ 删除</button>
            </div>
          </div>
        </div>
      `).join('');
    } catch (e) {
      loading.style.display = 'none';
      container.innerHTML = '<div class="empty-state">加载失败，请重试</div>';
    }
  }

  async function moderateComment(id, status) {
    try {
      const res = await apiFetch(`/api/admin/comments/${id}`, {
        method: 'PATCH',
        body: JSON.stringify({ status })
      });
      if (res.ok) {
        showToast('操作成功');
        loadComments();
        loadStats();
      } else {
        showToast('操作失败');
      }
    } catch (e) {
      showToast('操作失败');
    }
  }

  async function deleteComment(id) {
    if (!confirm('确定删除这条评论？')) return;
    try {
      const res = await apiFetch(`/api/admin/comments/${id}`, { method: 'DELETE' });
      if (res.ok) {
        document.getElementById('comment-' + id)?.remove();
        showToast('已删除');
        loadStats();
      } else {
        showToast('删除失败');
      }
    } catch (e) {
      showToast('删除失败');
    }
  }

  // ── Posts ──
  async function loadPosts() {
    const container = document.getElementById('postsList');
    const loading = document.getElementById('postsLoading');
    loading.style.display = 'block';
    container.innerHTML = '';

    try {
      const res = await fetch('/api/posts');
      const data = await res.json();
      const posts = data.posts || [];
      loading.style.display = 'none';

      if (posts.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无文章</div>';
        return;
      }

      container.innerHTML = posts.map(p => `
        <div class="post-item">
          <div class="post-info">
            <div class="post-title">${escapeHtml(p.title)}</div>
            <div class="post-meta">${p.status} · ${formatTime(p.createdAt)} · ${p.author?.name || 'Unknown'}</div>
          </div>
          <div class="post-actions">
            <a href="/posts/${p.slug}" class="action-btn" style="background:#eff6ff;color:#1e40af" target="_blank">👁️ 查看</a>
          </div>
        </div>
      `).join('');
    } catch (e) {
      loading.style.display = 'none';
      container.innerHTML = '<div class="empty-state">加载失败</div>';
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts > 1e12 ? ts : ts * 1000);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
    if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
    return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
  }

  // ── Init ──
  if (!requireAuth()) {} else {
    loadStats();
    loadComments();
    document.getElementById('tab-posts').addEventListener('activate', loadPosts);
    document.querySelector('.tab[onclick*="posts"]').addEventListener('click', loadPosts);
  }
</script>
</body>
</html>
