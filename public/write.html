<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写文章 - CloudBlog</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.2.0/github-markdown.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; min-height: 100vh; }
    header {
      background: white; border-bottom: 1px solid #e5e7eb; padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    header .left { display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 16px; font-weight: 600; color: #111827; }
    header .back { color: #6b7280; text-decoration: none; font-size: 14px; }
    header .back:hover { color: #3b82f6; }
    .header-actions { display: flex; gap: 8px; }
    .btn { padding: 7px 16px; border-radius: 8px; border: 1px solid #d1d5db; background: white; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
    .btn:hover { background: #f3f4f6; }
    .btn-primary { background: #3b82f6; color: white; border-color: #3b82f6; }
    .btn-primary:hover { background: #2563eb; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    main { max-width: 860px; margin: 0 auto; padding: 32px 24px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .slug-row { display: flex; gap: 8px; align-items: center; }
    .slug-row input { flex: 1; }
    .slug-preview { font-size: 12px; color: #9ca3af; }
    input[type="text"], textarea, select {
      width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px;
      font-size: 15px; font-family: inherit; transition: border-color 0.2s;
    }
    input[type="text"]:focus, textarea:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    textarea#content { min-height: 500px; font-family: 'SF Mono', 'Consolas', monospace; font-size: 14px; line-height: 1.7; resize: vertical; }
    textarea#excerpt { min-height: 80px; resize: vertical; }
    .tags-input-container { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .tag-chip { display: inline-flex; align-items: center; gap: 4px; background: #eff6ff; color: #1e40af; padding: 4px 10px; border-radius: 16px; font-size: 13px; }
    .tag-chip button { background: none; border: none; cursor: pointer; color: #1e40af; font-size: 14px; line-height: 1; padding: 0; }
    .tag-chip button:hover { color: #1d4ed8; }
    .char-count { font-size: 12px; color: #9ca3af; text-align: right; margin-top: 4px; }
    .help-text { font-size: 12px; color: #9ca3af; margin-top: 4px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1c1917; color: white; padding: 10px 24px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; }
    .toast.show { opacity: 1; }
    .preview-toggle { display: flex; gap: 4px; }
    .preview-toggle button { padding: 7px 12px; border-radius: 8px; border: 1px solid #d1d5db; background: white; cursor: pointer; font-size: 13px; }
    .preview-toggle button.active { background: #eff6ff; color: #1e40af; border-color: #bfdbfe; }
    .status-row { display: flex; gap: 12px; align-items: center; }
    .status-row select { width: auto; min-width: 120px; }
  </style>
</head>
<body>
  <header>
    <div class="left">
      <a href="/" class="back">← 返回</a>
      <h1>✏️ 写文章</h1>
    </div>
    <div class="header-actions">
      <div class="preview-toggle">
        <button class="active" id="writeBtn" onclick="setMode('write')">编写</button>
        <button id="previewBtn" onclick="setMode('preview')">预览</button>
      </div>
      <button class="btn" id="draftBtn" onclick="savePost('draft')">保存草稿</button>
      <button class="btn btn-primary" id="publishBtn" onclick="savePost('published')">发布</button>
    </div>
  </header>

  <main>
    <div class="form-group">
      <label>标题 *</label>
      <input type="text" id="title" placeholder="输入文章标题..." maxlength="200" oninput="updateSlug()">
    </div>

    <div class="form-group">
      <label>URL Slug</label>
      <div class="slug-row">
        <input type="text" id="slug" placeholder="auto-generated-from-title">
        <span class="slug-preview">/posts/</span>
      </div>
      <p class="help-text">留空则根据标题自动生成</p>
    </div>

    <div class="form-group">
      <label>摘要</label>
      <textarea id="excerpt" placeholder="文章的简短描述（可选），用于列表页展示..." maxlength="300"></textarea>
      <div class="char-count"><span id="excerptCount">0</span>/300</div>
    </div>

    <div class="form-group">
      <label>标签</label>
      <div class="tags-input-container">
        <div id="tagChips"></div>
        <input type="text" id="tagInput" placeholder="输入标签后按回车添加" style="width: 180px; padding: 6px 10px; font-size: 13px;" onkeydown="handleTagKeydown(event)">
      </div>
      <p class="help-text">按回车添加标签，最多5个</p>
    </div>

    <div class="form-group">
      <label>正文 *</label>
      <textarea id="content" placeholder="使用 Markdown 编写文章内容..."></textarea>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    let currentTags = [];
    let currentMode = 'write';
    let isSaving = false;

    function updateSlug() {
      const title = document.getElementById('title').value;
      if (!document.getElementById('slug').dataset.userEdited) {
        const slug = title.toLowerCase()
          .replace(/[^a-z0-9\u4e00-\u9fa5]+/g, '-')
          .replace(/(^-|-$)/g, '');
        document.getElementById('slug').value = slug;
      }
    }

    document.getElementById('slug').addEventListener('input', function() {
      this.dataset.userEdited = 'true';
    });

    document.getElementById('excerpt').addEventListener('input', function() {
      document.getElementById('excerptCount').textContent = this.value.length;
    });

    function handleTagKeydown(e) {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        addTag(e.target.value.replace(/,$/, '').trim());
        e.target.value = '';
      }
    }

    function addTag(name) {
      name = name.trim();
      if (!name || currentTags.includes(name) || currentTags.length >= 5) return;
      currentTags.push(name);
      renderTags();
    }

    function removeTag(name) {
      currentTags = currentTags.filter(t => t !== name);
      renderTags();
    }

    function renderTags() {
      document.getElementById('tagChips').innerHTML = currentTags.map(t =>
        `<span class="tag-chip">${escapeHtml(t)}<button onclick="removeTag('${escapeHtml(t)}')">×</button></span>`
      ).join('');
    }

    async function savePost(status) {
      if (isSaving) return;
      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();
      if (!title || !content) {
        showToast('标题和内容不能为空');
        return;
      }

      isSaving = true;
      document.getElementById('publishBtn').disabled = true;
      document.getElementById('draftBtn').disabled = true;

      const slug = document.getElementById('slug').value.trim() || undefined;
      const excerpt = document.getElementById('excerpt').value.trim() || undefined;

      try {
        const res = await fetch('/api/posts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getApiSecret() },
          body: JSON.stringify({ title, slug, content, excerpt, status, tags: currentTags })
        });

        if (res.ok) {
          const data = await res.json();
          showToast(status === 'published' ? '发布成功！' : '草稿已保存');
          setTimeout(() => { window.location.href = `/posts/${data.slug}`; }, 800);
        } else {
          const err = await res.json();
          showToast(err.error || '保存失败');
        }
      } catch (e) {
        showToast('保存失败: ' + e.message);
      } finally {
        isSaving = false;
        document.getElementById('publishBtn').disabled = false;
        document.getElementById('draftBtn').disabled = false;
      }
    }

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('writeBtn').classList.toggle('active', mode === 'write');
      document.getElementById('previewBtn').classList.toggle('active', mode === 'preview');
      const content = document.getElementById('content');
      if (mode === 'preview') {
        content.style.fontFamily = 'inherit';
        content.style.whiteSpace = 'pre-wrap';
      } else {
        content.style.fontFamily = "'SF Mono', 'Consolas', monospace";
        content.style.whiteSpace = 'pre';
      }
    }

    function getApiSecret() {
      return localStorage.getItem('cloudblog_api_secret') || prompt('请输入 API Secret（用于发布文章）:') || '';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // Ctrl+S to save draft
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        savePost('draft');
      }
    });
  </script>
</body>
</html>
