<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线 - CloudBlog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #f9fafb; color: #374151;
      padding: 20px;
    }
    .container { text-align: center; max-width: 400px; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; margin-bottom: 8px; color: #111827; }
    p { font-size: 16px; color: #6b7280; margin-bottom: 24px; }
    button {
      padding: 10px 24px; font-size: 16px; border-radius: 8px;
      border: none; background: #3b82f6; color: white; cursor: pointer;
    }
    button:hover { background: #2563eb; }
    .cached-list { text-align: left; margin-top: 24px; }
    .cached-list h3 { font-size: 14px; color: #9ca3af; margin-bottom: 8px; }
    .cached-list ul { list-style: none; }
    .cached-list li { padding: 6px 0; font-size: 14px; color: #374151; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>您当前处于离线状态</h1>
    <p>无法连接服务器。请检查您的网络连接，或查看已缓存的页面。</p>
    <button onclick="history.back()">返回上一页</button>
    <div class="cached-list" id="cachedList" style="display:none">
      <h3>已缓存的文章</h3>
      <ul id="cachedPages"></ul>
    </div>
  </div>
  <script>
    if ('caches' in window) {
      caches.open('cloudblog-pages-v1').then(cache => {
        cache.keys().then(keys => {
          const htmlKeys = keys.filter(k => k.url.endsWith('.html') || k.url.includes('/posts/'));
          if (htmlKeys.length > 0) {
            document.getElementById('cachedList').style.display = 'block';
            const ul = document.getElementById('cachedPages');
            htmlKeys.slice(0, 5).forEach(k => {
              const li = document.createElement('li');
              li.textContent = new URL(k.url).pathname;
              ul.appendChild(li);
            });
          }
        });
      });
    }
  </script>
</body>
</html>
