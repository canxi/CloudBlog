<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线 - CloudBlog</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f9fafb; }
    .card { text-align: center; padding: 2rem; background: white; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { font-size: 1.5rem; color: #374151; margin-bottom: 0.5rem; }
    p { color: #6b7280; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; background: #2563eb; color: white; border: none; border-radius: 0.5rem; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📡 当前离线</h1>
    <p>网络连接已断开，请检查网络后重试</p>
    <button onclick="location.reload()">重试</button>
  </div>
</body>
</html>
